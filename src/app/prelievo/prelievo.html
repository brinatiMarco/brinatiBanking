<div class="page-wrapper">
  <div class="card">

    <div class="card-header">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
      </div>
      <div>
        <h2 class="card-title">Prelievo</h2>
        <p class="card-subtitle">Preleva dal tuo conto corrente</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="form-container">

      <div class="field-group">
        <label class="field-label">Importo (€)</label>
        <div class="input-wrapper">
          <span class="input-prefix">€</span>
          <input
            type="number"
            name="importo"
            [(ngModel)]="tr.importo"
            placeholder="0.00"
            class="field-input"
          />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Descrizione</label>
        <div class="input-wrapper">
          <input
            type="text"
            name="dettagli"
            [(ngModel)]="tr.dettagli"
            placeholder="Es. Spesa supermercato"
            class="field-input no-prefix"
          />
        </div>
      </div>

      <button 
        class="btn-submit" 
        (click)="aggiungiTransazione()"
        [disabled]="isLoading">
        
        <svg *ngIf="!isLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M5 12h14M12 5l7 7-7 7" />
        </svg>

        <svg *ngIf="isLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="spinner">
          <circle cx="12" cy="12" r="10" fill="none"></circle>
          <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
        </svg>

        {{ isLoading ? 'Caricamento...' : 'Conferma Prelievo' }}
      </button>

    </div>
  </div>
</div>
