<div class="card">
  <h2 class="card-title">PRELIEVO</h2>
  
  <div class="form-container">

    <label class="text-danger">Importo</label>
    <input type="number" name="importo" [(ngModel)]="tr.importo">

    <label class="text-danger">Descrizione</label>
    <input type="text" nane="dettagli" [(ngModel)]="tr.dettagli">

    
    <button class="btn-submit" (click)="aggiungiTransazione()">
      Conferma Prelievo
    </button>
  </div>

</div>
