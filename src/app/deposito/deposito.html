<div class="card">
    <h2 class="card-title">DEPOSITO</h2>

    <div class="form-container">
        <label class="text-danger">ID Utente</label>
        <input type="number" [(ngModel)]="tr.id">
        <label class="text-danger">Importo</label>
        <input type="number" [(ngModel)]="tr.importo">
        <label class="text-danger">Descrizione</label>
        <input type="text" [(ngModel)]="tr.dettagli">
        
        
        <button class="btn-submit" (click)="aggiungiTransazione()">
            Conferma Prelievo
        </button>
    </div>

</div>
