<div class="page-wrapper">

  <div class="card">

    <div class="header">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div>
        <h2 class="title">Accedi</h2>
        <p class="subtitle">Inserisci il tuo ID account</p>
      </div>
    </div>

    <div class="divider"></div>

    <form (ngSubmit)="effettuaAccesso()" class="form">

      <div class="field-group">
        <label class="field-label">ID Account</label>
        <div class="input-wrapper">
          <span class="input-icon">#</span>
          <input
            type="number"
            name="account_id"
            [(ngModel)]="acc.account_id"
            placeholder="Es. 11"
            class="field-input"
            min="1"
            required
            [disabled]="isLoading"
          />
        </div>
      </div>

      <button 
        type="submit" 
        class="btn-submit"
        [disabled]="!acc.account_id || acc.account_id <= 0 || isLoading">
        
        <svg *ngIf="!isLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v2a2 2 0 01-2 2H7a2 2 0 01-2-2v-2" />
        </svg>

        <svg *ngIf="isLoading" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="spinner">
          <circle cx="12" cy="12" r="10" fill="none"></circle>
          <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
        </svg>

        {{ isLoading ? 'Caricamento...' : 'Accedi al tuo conto' }}
      </button>

    </form>

    <div class="info-box">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p>Usa il tuo ID account per accedere al sistema bancario.</p>
    </div>

  </div>

</div>
